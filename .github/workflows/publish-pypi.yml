name: Publish to PyPI

# Publishes the package to PyPI on every `v*` tag push. Uses Trusted
# Publishing (OIDC) — no API token to rotate. Configured at:
# https://pypi.org/manage/project/vipmp-docs-mcp/settings/publishing/
#
# Initial setup (one-time, by a maintainer with PyPI write access):
#   1. Create a PyPI account.
#   2. Go to https://pypi.org/manage/account/publishing/ and add a
#      "pending publisher" with:
#        - Project name:        vipmp-docs-mcp
#        - Owner:               softwareone-platform
#        - Repository:          swo-adobe-vipm-docs-mcp
#        - Workflow filename:   publish-pypi.yml
#        - Environment name:    pypi
#   3. Push a v*.x.y tag. The workflow runs, claims the project on PyPI,
#      and publishes the first version. From then on, the publisher is
#      regular (not pending) and every subsequent v* tag publishes.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    # The "pypi" environment scopes the OIDC trust to this exact workflow
    # job — same name must be used when configuring the PyPI publisher.
    environment:
      name: pypi
      url: https://pypi.org/p/vipmp-docs-mcp

    permissions:
      # Required for Trusted Publishing — lets the action mint an OIDC
      # token that PyPI exchanges for a short-lived API token.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches package version
        # Belt-and-braces: refuse to publish if the git tag doesn't match
        # the version in pyproject.toml. Catches the "I forgot to bump
        # version before tagging" mistake.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION doesn't match pyproject version $PKG_VERSION"
            exit 1
          fi
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel contents include data/index.json
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built"
          with zipfile.ZipFile(wheels[0]) as z:
              names = z.namelist()
              assert any("data/index.json" in n for n in names), \
                  f"wheel is missing data/index.json — contents: {names}"
              print(f"wheel ok — {len(names)} files, includes data/index.json")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password` — OIDC Trusted Publishing fills this in.
          # `verify-metadata: true` catches malformed package metadata.
          verify-metadata: true
          print-hash: true
