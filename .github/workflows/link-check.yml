name: Sitemap link check

# Weekly health-check: fetches every path Adobe lists in its sitemap.xml,
# reports 404s, and opens an issue if any are found. Run manually via
# workflow_dispatch whenever the server starts returning "page not found".

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Sundays at 03:17 UTC — off-peak, avoids contention with other crons.
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch Adobe sitemap.xml and check every vipmp path
        id: check
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          from vipmp_docs_mcp.autositemap import _fetch_sitemap_paths
          from vipmp_docs_mcp.fetcher import FetchError, fetch_page_html

          paths = _fetch_sitemap_paths()
          print(f"Checking {len(paths)} paths...")

          errors = []
          ok = 0
          for path in paths:
              try:
                  fetch_page_html(path)
                  ok += 1
              except FetchError as exc:
                  errors.append((path, str(exc)))
                  print(f"  FAIL {path}: {exc}")

          print(f"\nResult: {ok}/{len(paths)} OK, {len(errors)} failed")

          # Emit output for the next step.
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"total={len(paths)}\n")
              fh.write(f"failed={len(errors)}\n")
              # Dump errors to a file for the issue body.
              with open("link-check-errors.txt", "w", encoding="utf-8") as ef:
                  for path, msg in errors:
                      ef.write(f"- `{path}` — {msg}\n")

          if errors:
              sys.exit(1)  # Fail the job so the "on failure" step opens an issue.
          PY

      - name: Open issue on failure
        if: failure() && steps.check.outputs.failed != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('link-check-errors.txt', 'utf8');
            const total = '${{ steps.check.outputs.total }}';
            const failed = '${{ steps.check.outputs.failed }}';

            // Dedupe — only open one issue per failing run.
            const title = `Sitemap link-check: ${failed}/${total} paths 404`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-check',
            });
            if (existing.some(i => i.title.startsWith('Sitemap link-check:'))) {
              console.log('Link-check issue already open; skipping create.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The weekly sitemap link-check found ${failed} of ${total} Adobe-listed paths returning errors:\n\n${body}\n\nLikely causes:\n- Adobe renamed or removed pages (common).\n- Temporary upstream outage (re-run the workflow).\n\nIf pages have genuinely moved, run \`refresh_vipmp_sitemap\` from an MCP client or bump the hand-curated fallback.`,
              labels: ['link-check'],
            });
