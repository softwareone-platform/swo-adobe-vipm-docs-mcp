name: Refresh structured index

# Rebuilds src/vipmp_docs_mcp/data/index.json from live Adobe docs.
# DAILY cron (release notes change frequently and developers care about
# catching changes fast); also runnable on demand via workflow_dispatch.
#
# If the rebuilt index differs from what's on main (ignoring the built_at
# timestamp), opens a PR so humans can sanity-check the diff before
# merging. Unchanged days produce nothing.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every day at 04:23 UTC — off-peak.
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering this run? (appears in the PR body)'
        required: false
        default: 'Manual refresh'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Rebuild sitemap + index
        id: rebuild
        # build_index() already refreshes the sitemap from Adobe's live XML
        # internally (fix from #4), but we also persist it to the package
        # data directory here so fresh installs get a current fallback
        # shipped with the wheel (#6).
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          from vipmp_docs_mcp.autositemap import (
              PACKAGE_SITEMAP_PATH,
              build_sitemap,
              save_sitemap,
          )
          from vipmp_docs_mcp.index import (
              PACKAGE_INDEX_PATH,
              build_index,
              save_index,
          )

          # 1) Refresh the shipped sitemap fallback from Adobe.
          sitemap_start = time.time()
          sitemap_entries = build_sitemap()
          save_sitemap(sitemap_entries, PACKAGE_SITEMAP_PATH)
          sitemap_elapsed = time.time() - sitemap_start

          # 2) Rebuild the structured index. build_index() refreshes the
          # sitemap again internally; cheap on cache hits thanks to ETags.
          index_start = time.time()
          snap = build_index()
          index_elapsed = time.time() - index_start

          save_index(snap, PACKAGE_INDEX_PATH)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"pages_parsed={snap.pages_parsed}\n")
              fh.write(f"sitemap_size={snap.source_sitemap_size}\n")
              fh.write(f"endpoints={len(snap.endpoints)}\n")
              fh.write(f"error_codes={len(snap.error_codes)}\n")
              fh.write(f"schemas={len(snap.schemas)}\n")
              fh.write(f"parse_errors={len(snap.parse_errors)}\n")
              fh.write(f"sitemap_elapsed_seconds={sitemap_elapsed:.1f}\n")
              fh.write(f"index_elapsed_seconds={index_elapsed:.1f}\n")

          # Emit error list for the PR body.
          Path("parse-errors.txt").write_text(
              "\n".join(f"- `{p}` — {e}" for p, e in snap.parse_errors)
              or "_(no parse errors)_",
              encoding="utf-8",
          )
          PY

      - name: Validate structural invariants
        # Fail-loud guard against poisoning / parser regressions before the
        # PR ever opens. Same floors that `remote_index._check_invariants`
        # enforces at fetch time, plus a parse-error fraction check that
        # mirrors `STALE_INDEX_FAILURE_FRACTION` in server.py. If any
        # invariant fails the workflow fails and no PR is opened — the
        # daily refresh just pauses until a human investigates.
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          from vipmp_docs_mcp.index import INDEX_SCHEMA_VERSION
          from vipmp_docs_mcp.remote_index import (
              MIN_ENDPOINTS,
              MIN_ERROR_CODES,
              MIN_SCHEMAS,
              _check_invariants,
              IndexInvariantError,
          )
          from vipmp_docs_mcp.server import STALE_INDEX_FAILURE_FRACTION

          path = Path("src/vipmp_docs_mcp/data/index.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          # Structural floors (schema version, endpoint/error-code/schema counts).
          try:
              _check_invariants(data)
          except IndexInvariantError as exc:
              print(f"::error::Index failed structural invariants: {exc}")
              sys.exit(1)

          # Parse-error fraction sanity check.
          sitemap_size = int(data.get("source_sitemap_size") or 0)
          parse_errors = data.get("parse_errors") or []
          if sitemap_size > 0:
              fraction = len(parse_errors) / sitemap_size
              if fraction >= STALE_INDEX_FAILURE_FRACTION:
                  print(
                      f"::error::parse-error fraction {fraction:.0%} >= "
                      f"threshold {STALE_INDEX_FAILURE_FRACTION:.0%} "
                      f"({len(parse_errors)}/{sitemap_size}); aborting refresh"
                  )
                  sys.exit(1)

          print(
              f"OK: schema_version={data.get('schema_version')} "
              f"(want {INDEX_SCHEMA_VERSION}), "
              f"endpoints={len(data.get('endpoints', []))} "
              f"(min {MIN_ENDPOINTS}), "
              f"error_codes={len(data.get('error_codes', []))} "
              f"(min {MIN_ERROR_CODES}), "
              f"schemas={len(data.get('schemas', []))} "
              f"(min {MIN_SCHEMAS}), "
              f"parse_errors={len(parse_errors)}/{sitemap_size}"
          )
          PY

      - name: Check if index or sitemap changed
        id: diff
        run: |
          # Strip timestamps before diffing — otherwise every run produces
          # noise. Compare structural content only.
          git --no-pager diff --quiet \
              -I '^  "built_at":' \
              -I '^  "generated_at":' \
              src/vipmp_docs_mcp/data/index.json \
              src/vipmp_docs_mcp/data/sitemap.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR with refreshed index
        id: open_pr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # Use the same admin PAT the merge step uses, not GITHUB_TOKEN.
          # GitHub blocks commits/PRs authored via GITHUB_TOKEN from
          # triggering downstream workflows — meaning the ci.yml
          # `pull_request` jobs never ran on bot PRs, the required
          # `build (3.12)` / `build (3.13)` checks stayed perpetually
          # missing, and `gh pr merge --auto` arm-and-forever-waited.
          # Authoring as the PAT owner (a repo admin) makes the bot PR
          # look like a normal user PR, CI fires, and auto-merge
          # completes. Also inherits the admin role's ruleset bypass,
          # so the "required review" rule doesn't block either.
          token: ${{ secrets.REFRESH_INDEX_PAT }}
          commit-message: 'chore(data): refresh sitemap + structured index from Adobe docs'
          branch: bot/refresh-index
          delete-branch: true
          title: 'chore(data): refresh sitemap + structured index from Adobe docs'
          body: |
            Automated refresh of `src/vipmp_docs_mcp/data/sitemap.json` and `src/vipmp_docs_mcp/data/index.json` from live Adobe docs.

            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && inputs.reason || 'scheduled (weekly)' }}

            ## Build stats

            | | |
            |---|---|
            | Sitemap size | ${{ steps.rebuild.outputs.sitemap_size }} |
            | Pages parsed | ${{ steps.rebuild.outputs.pages_parsed }} |
            | Endpoints | ${{ steps.rebuild.outputs.endpoints }} |
            | Error codes | ${{ steps.rebuild.outputs.error_codes }} |
            | Schemas | ${{ steps.rebuild.outputs.schemas }} |
            | Parse errors | ${{ steps.rebuild.outputs.parse_errors }} |
            | Sitemap build time | ${{ steps.rebuild.outputs.sitemap_elapsed_seconds }}s |
            | Index build time | ${{ steps.rebuild.outputs.index_elapsed_seconds }}s |

            ## Parse errors (if any)

            See the workflow run artifact and/or the diff.

            ## What to check before merging

            - Large changes in **endpoints** / **error_codes** / **schemas** counts — could mean Adobe restructured, or our parser regressed.
            - Any **parse_errors** entries — new pages we can't parse.
            - Spot-check the JSON diff for obvious junk (empty strings, stray HTML leaking through, etc.).

            Downstream installs (`pip install -e .`, `uvx --from git+...`) pick up the new baseline on the next cache refresh, and the v0.7.0+ github-remote tier now fetches it within 12 h without a PyPI release.

            ---

            🤖 Generated by [`.github/workflows/refresh-index.yml`](.github/workflows/refresh-index.yml) — auto-merged once CI passes.

      - name: Enable auto-merge
        # Tell GitHub to merge the PR as soon as required checks pass.
        # Uses REFRESH_INDEX_PAT (a fine-grained PAT owned by a repo admin)
        # rather than GITHUB_TOKEN because the ruleset on main requires a
        # review for every PR. The admin role already carries an `always`
        # bypass on that rule, so a merge call authenticated as the admin
        # sails through without needing an approver. GITHUB_TOKEN can't
        # do this — github-actions[bot] is not in the bypass list (and
        # GitHub's ruleset UI doesn't expose it as an addable actor).
        #
        # If the PAT is missing or expired the step fails loudly and the
        # bot's PR stays open for manual merge — no data loss, just a
        # pause until the token is renewed.
        if: steps.open_pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.REFRESH_INDEX_PAT }}
        run: |
          gh pr merge "${{ steps.open_pr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --merge

      - name: No changes to index
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "Index unchanged since last build. Nothing to commit."
