name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Import check
        run: |
          python -c "from vipmp_docs_mcp import server; print(f'Loaded {len(server._get_sitemap())} sitemap entries')"

      - name: Console script is registered
        # Smoke-test that entry point resolves. We can't actually invoke it
        # (mcp.run() blocks on stdio), but `which` proves it installed.
        run: which vipmp-docs-mcp

      - name: Tests (with coverage)
        run: pytest -v --cov=vipmp_docs_mcp --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
